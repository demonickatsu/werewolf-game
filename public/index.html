<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf Game - Landing Page</title>
    <style>
        * {
            font-family: sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="1" fill="%23000" opacity="0.1"/></svg>');
        }
        
        .container {
            text-align: center;
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        
        .button {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 200px;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .player-btn {
            background-color: #4CAF50;
        }
        
        .player-btn:hover {
            background-color: #45a049;
        }
        
        .moderator-btn {
            background-color: #2196F3;
        }
        
        .moderator-btn:hover {
            background-color: #0b7dda;
        }
        
        .game-icon {
            font-size: 60px;
            margin-bottom: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-icon">🐺🌕</div>
        <h1>Werewolf Game</h1>
        <p>Choose your role to continue:</p>
        
        <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 15px; align-items: center;">
            <button class="button player-btn" onclick="window.location.href='player.html'">
                I'm a Player
            </button>
            <button class="button moderator-btn" onclick="window.location.href='moderator.html'">
                I'm a Moderator
            </button>
        </div>
    </div>
</body>
</html>
